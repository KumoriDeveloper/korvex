<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация капитана — Korvex</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="/korvex/favicon.ico" type="image/x-icon">
    <style>
        .register-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: var(--bg-secondary);
        }
        .register-form {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2rem;
            max-width: 500px;
            width: 100%;
        }
        .register-form h1 {
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 1rem;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }
        .form-actions .btn {
            flex: 1;
        }
        .error-message {
            color: var(--danger);
            font-size: 0.9rem;
            margin-top: 0.5rem;
            display: none;
        }
        .error-message.show {
            display: block;
        }
        .success-message {
            background: var(--success-muted);
            color: var(--success);
            padding: 1rem;
            border-radius: var(--radius-sm);
            margin-bottom: 1rem;
            display: none;
        }
        .success-message.show {
            display: block;
        }
        .player-rows { display: flex; flex-direction: column; gap: 0.75rem; }
        .player-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }
        .player-row input { margin-bottom: 0; }
        @media (max-width: 500px) {
            .player-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="register-page">
        <div class="register-form">
            <h1>Создание команды</h1>
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">
                Регистрация доступна только для капитанов команд
            </p>
            
            <div class="success-message" id="successMessage">
                Команда успешно создана и отправлена на модерацию!
            </div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label>Имя капитана *</label>
                    <input type="text" name="captainName" required>
                </div>
                
                <div class="form-group">
                    <label>TG логин для связи *</label>
                    <input type="text" name="tg_contact" required placeholder="@username">
                </div>
                
                <div class="form-group">
                    <label>Название команды *</label>
                    <input type="text" name="teamName" required>
                </div>
                
                <div class="form-group">
                    <label>Логотип команды (URL)</label>
                    <input type="url" name="teamLogo" placeholder="https://example.com/logo.png">
                </div>
                
                <div class="form-group">
                    <label>Описание команды</label>
                    <textarea name="teamDescription" placeholder="Расскажите о вашей команде..."></textarea>
                </div>
                
                <div class="form-group">
                    <label>Состав команды *</label>
                    <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0.75rem;">Укажите никнейм каждого игрока</p>
                    <div class="player-rows">
                        <div class="player-row">
                            <input type="text" name="playerName_0" placeholder="Никнейм 1" required>
                        </div>
                        <div class="player-row">
                            <input type="text" name="playerName_1" placeholder="Никнейм 2" required>
                        </div>
                        <div class="player-row">
                            <input type="text" name="playerName_2" placeholder="Никнейм 3" required>
                        </div>
                        <div class="player-row">
                            <input type="text" name="playerName_3" placeholder="Никнейм 4" required>
                        </div>
                        <div class="player-row">
                            <input type="text" name="playerName_4" placeholder="Никнейм 5" required>
                        </div>
                    </div>
                </div>
                
                <div class="error-message" id="errorMessage"></div>
                
                <div class="form-actions">
                    <a href="index.html" class="btn btn--ghost">Отмена</a>
                    <button type="submit" class="btn btn--primary">Отправить на модерацию</button>
                </div>
            </form>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const teamMembers = [];
            for (let i = 0; i < 5; i++) {
                const name = (formData.get('playerName_' + i) || '').trim();
                if (name) teamMembers.push({ name: name });
            }
            
            const teamData = {
                captainName: formData.get('captainName'),
                tg_contact: (formData.get('tg_contact') || '').trim(),
                teamName: formData.get('teamName'),
                teamLogo: formData.get('teamLogo') || 'https://api.dicebear.com/7.x/identicon/svg?seed=' + encodeURIComponent(formData.get('teamName')),
                teamDescription: formData.get('teamDescription'),
                teamMembers: teamMembers,
                status: 'pending'
            };
            
            if (teamMembers.length < 5) {
                alert('Укажите всех 5 игроков команды.');
                return;
            }
            
            teamsAPI.create({
                captainName: teamData.captainName,
                tg_contact: teamData.tg_contact,
                teamName: teamData.teamName,
                teamLogo: teamData.teamLogo,
                teamDescription: teamData.teamDescription,
                teamMembers: teamData.teamMembers,
                status: teamData.status
            }).then(() => {
                // Показать сообщение об успехе
                document.getElementById('successMessage').classList.add('show');
                this.reset();
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            }).catch(error => {
                console.error('Ошибка регистрации команды:', error);
                alert('Ошибка при отправке заявки. Убедитесь, что сервер запущен.');
            });
        });
    </script>
</body>
</html>
